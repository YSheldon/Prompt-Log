kind = "web"
previewPath = "/"
title = "Prompt Logger"
version = "1.0.0"
id = "artifacts/prompt-logger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25136

[services.development]
run = "pnpm --filter @workspace/prompt-logger run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prompt-logger", "run", "build" ]
publicDir = "artifacts/prompt-logger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25136"
BASE_PATH = "/"
